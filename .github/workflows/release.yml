name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  chrome:
    name: Chrome release artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:chrome
      - name: Resolve extension test browser
        run: |
          CHROME="$(node -e "const { existsSync } = require('node:fs'); const { chromium } = require('playwright'); const path = chromium.executablePath(); if (existsSync(path)) process.stdout.write(path)")"
          if [ -z "$CHROME" ]; then
            npx playwright install chromium
            CHROME="$(node -e "const { chromium } = require('playwright'); process.stdout.write(chromium.executablePath())")"
          fi
          if [ ! -x "$CHROME" ]; then
            CHROME="$(command -v chromium || command -v chromium-browser || true)"
          fi
          if [ -z "$CHROME" ]; then
            echo "No Chromium executable found for extension e2e." >&2
            exit 1
          fi
          echo "PLAYWRIGHT_CHROME_EXECUTABLE=$CHROME" >> "$GITHUB_ENV"
          "$CHROME" --version
      - run: xvfb-run --auto-servernum npm run test:e2e:built
      - run: npm audit --omit=dev
      - run: npm run zip

      - name: Resolve artifact name
        id: package
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "zip_name=browser-bridge-${VERSION}-chrome.zip" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        run: |
          cd .output
          sha256sum "${{ steps.package.outputs.zip_name }}" > SHA256SUMS

      - uses: actions/upload-artifact@v7
        with:
          name: browser-bridge-chrome-release
          path: |
            .output/${{ steps.package.outputs.zip_name }}
            .output/SHA256SUMS
          if-no-files-found: error

      - name: Attach assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file CHANGELOG.md
          gh release upload "${GITHUB_REF_NAME}" \
            ".output/${{ steps.package.outputs.zip_name }}" \
            .output/SHA256SUMS \
            --clobber
