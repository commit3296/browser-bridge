name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:chrome
      - run: npm run build:edge
      - run: npm run build:firefox
      - name: Resolve extension test browser
        run: |
          CHROME="$(command -v chromium || command -v chromium-browser || true)"
          if [ -z "$CHROME" ]; then
            npx playwright install chromium
            CHROME="$(node -e "const { chromium } = require('playwright'); process.stdout.write(chromium.executablePath())")"
          fi
          echo "PLAYWRIGHT_CHROME_EXECUTABLE=$CHROME" >> "$GITHUB_ENV"
          "$CHROME" --version
      - run: xvfb-run --auto-servernum npm run test:e2e:built
      - run: npm audit --omit=dev
      - run: npm run zip
