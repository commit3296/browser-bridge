name: Bug report
description: Report a reproducible Browser Bridge problem
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not attach archive passwords, decrypted archives, or cookie values.
        Migration report JSON is useful only after you confirm it contains no secrets.
  - type: input
    id: version
    attributes:
      label: Browser Bridge version
      placeholder: "0.1.2 or commit hash"
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: "Chrome 149.0.0.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11, macOS 15, Fedora 42"
    validations:
      required: true
  - type: dropdown
    id: build_source
    attributes:
      label: Build source
      options:
        - Release zip
        - Unpacked .output/chrome-mv3
        - Local development build
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: report
    attributes:
      label: Logs or migration report
      description: Paste only redacted logs or report JSON confirmed to contain no cookie values or archive passwords.
      render: text
    validations:
      required: false
